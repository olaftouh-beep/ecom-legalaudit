<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalAudit Maroc — Ecom Responsable</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F5F3; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
#app { width: 100%; max-width: 640px; background: white; border-radius: 16px; border: 1px solid #E5E5E3; overflow: hidden; display: flex; flex-direction: column; height: 620px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
#hdr { padding: 14px 18px; border-bottom: 1px solid #E5E5E3; display: flex; align-items: center; gap: 10px; background: white; }
.logo { width: 34px; height: 34px; background: #0F1F2E; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #C9A84C; flex-shrink: 0; }
.hdr-info .name { font-size: 14px; font-weight: 600; color: #0F1F2E; }
.hdr-info .sub { font-size: 11px; color: #6B7280; }
.dot { margin-left: auto; width: 8px; height: 8px; background: #10B981; border-radius: 50%; }
#setup { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
#setup .title { font-size: 16px; font-weight: 600; color: #0F1F2E; }
#setup .desc { font-size: 13px; color: #6B7280; line-height: 1.6; }
#setup input { width: 100%; padding: 10px 14px; border: 1px solid #E5E5E3; border-radius: 8px; font-size: 13px; color: #0F1F2E; outline: none; }
#setup button { padding: 11px 20px; background: #0F1F2E; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
#setup button:hover { background: #C9A84C; }
#msgs { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; display: none; }
.msg { display: flex; gap: 8px; }
.msg.user { flex-direction: row-reverse; }
.av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; flex-shrink: 0; }
.av.bot { background: #0F1F2E; color: #C9A84C; }
.av.user { background: #EEF2FF; color: #4338CA; }
.bub { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 13px; line-height: 1.65; }
.bub.bot { background: #F9F9F7; border: 1px solid #E5E5E3; border-top-left-radius: 4px; color: #0F1F2E; }
.bub.user { background: #0F1F2E; color: white; border-top-right-radius: 4px; }
.ok { color: #059669; font-weight: 500; }
.warn { color: #D97706; font-weight: 500; }
.err { color: #DC2626; font-weight: 500; }
.typing { display: flex; gap: 4px; padding: 10px 14px; background: #F9F9F7; border: 1px solid #E5E5E3; border-radius: 14px; border-top-left-radius: 4px; width: fit-content; }
.typing span { width: 5px; height: 5px; background: #9CA3AF; border-radius: 50%; animation: bounce 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }
#inp-area { padding: 12px 16px; border-top: 1px solid #E5E5E3; display: flex; gap: 8px; display: none; background: white; }
#inp-area input { flex: 1; padding: 9px 13px; border: 1px solid #E5E5E3; border-radius: 8px; font-size: 13px; outline: none; }
#send { padding: 9px 16px; background: #0F1F2E; color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; }
#send:hover { background: #C9A84C; }
.disc { font-size: 11px; color: #9CA3AF; text-align: center; padding: 7px; border-top: 1px solid #E5E5E3; background: white; }
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="logo">ER</div>
    <div class="hdr-info">
      <div class="name">LegalAudit Maroc</div>
      <div class="sub">Ecom Responsable · Audit de conformité</div>
    </div>
    <div class="dot"></div>
  </div>
  <div id="setup">
    <div class="title">Démarrer votre audit</div>
    <div class="desc">Collez votre clé API Claude (Anthropic) pour activer le bot. Elle reste sur votre appareil.</div>
    <input type="password" id="api-key" placeholder="Votre clé API Claude (sk-ant-...)" />
    <button onclick="startBot()">Démarrer l'audit →</button>
  </div>
  <div id="msgs"></div>
  <div id="inp-area">
    <input type="text" id="user-inp" placeholder="Répondez ou tapez votre message..." />
    <button id="send">Envoyer</button>
  </div>
  <div class="disc">Diagnostic indicatif · Ecom Responsable — Omar Laftouh</div>
</div>
<script>
const SYSTEM = `Tu es LegalAudit Maroc, assistant d'audit de conformité juridique d'Ecom Responsable, créé par Omar Laftouh, juriste LegalTech au Maroc.

QUESTIONS D'ENTRÉE — 2 seulement :
1. Avez-vous un site avec une URL ? Si oui demande l'URL. Si non questionnaire guidé.
2. Que vendez-vous ? Pour détecter si Famille 4 s'applique.

4 FAMILLES D'OBLIGATIONS :

FAMILLE 1 — Données personnelles (loi 09-08) :
🔴 Informez-vous vos clients que vous collectez leurs données ?
🔴 Utilisez-vous ces données uniquement pour les commandes ?
🔴 Vos clients peuvent-ils demander la suppression de leurs données ?
🔴 Vos données clients sont-elles sécurisées ?
🟡 Avez-vous déclaré votre activité à la CNDP ?

FAMILLE 2 — Contrat / CGV (loi 31-08) :
🔴 Informez-vous le client des délais et frais de livraison AVANT la commande ?
🔴 Envoyez-vous un récapitulatif complet AVANT confirmation du client ?
🔴 Informez-vous le client de son droit de retour 7 jours ?
🔴 Envoyez-vous une confirmation écrite à la livraison ?
🔴 Vos conditions de paiement sont-elles claires avant la commande ?
🟡 Avez-vous des CGV rédigées ?

FAMILLE 3 — Mentions (loi 31-08) :
🔴 Votre nom et contact sont-ils visibles ?
🔴 Avez-vous une adresse pour les réclamations ?
🟡 Êtes-vous inscrit au RC ?
🟡 Avez-vous un numéro fiscal ?

FAMILLE 4 — Autorisations sectorielles :
Compléments alimentaires → 🔴 Autorisation ONSSA obligatoire
Alimentation importée → 🔴 Certificat ONSSA obligatoire
Médicaments → 🔴 ALERTE : réservé aux pharmaciens agréés
Cosmétiques → nous contacter directement

LOGIQUE : Une question à la fois. Max 7 questions. Si l'URL révèle déjà un élément ne pose pas la question.

RAPPORT FINAL :
✅ Points conformes
❌ Points non conformes → risque + action (🔴)
⚠️ Points à planifier (🟡)

Termine TOUJOURS par : "Pour corriger ces points, contactez Omar Laftouh — Ecom Responsable : linkedin.com/in/omar-laftouh"

RÈGLES : Langage simple. Bienveillant. Jamais de conseil juridique définitif. Pour vendeurs non déclarés : focus sur ce qu'ils peuvent faire maintenant.`;

let apiKey = '';
let history = [];
const msgs = document.getElementById('msgs');
const inpArea = document.getElementById('inp-area');
const setup = document.getElementById('setup');
const userInp = document.getElementById('user-inp');

function startBot() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) { alert('Veuillez entrer votre clé API'); return; }
  apiKey = key;
  setup.style.display = 'none';
  msgs.style.display = 'flex';
  inpArea.style.display = 'flex';
  init();
}

function addMsg(role, html, isHTML = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = `av ${role}`;
  av.textContent = role === 'bot' ? 'ER' : 'Vous';
  const bub = document.createElement('div');
  bub.className = `bub ${role}`;
  if (isHTML) bub.innerHTML = html;
  else bub.textContent = html;
  div.appendChild(av);
  div.appendChild(bub);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing';
  div.innerHTML = '<div class="av bot">ER</div><div class="typing"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function fmt(text) {
  return text
    .replace(/✅([^\n]*)/g, '<span class="ok">✅$1</span>')
    .replace(/❌([^\n]*)/g, '<span class="err">❌$1</span>')
    .replace(/⚠️([^\n]*)/g, '<span class="warn">⚠️$1</span>')
    .replace(/🔴([^\n]*)/g, '<span class="err">🔴$1</span>')
    .replace(/🟡([^\n]*)/g, '<span class="warn">🟡$1</span>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

async function callClaude(userMsg) {
  history.push({ role: 'user', content: userMsg });
  showTyping();
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content[0].text;
    removeTyping();
    addMsg('bot', fmt(reply), true);
    history.push({ role: 'assistant', content: reply });
  } catch (e) {
    removeTyping();
    addMsg('bot', 'Erreur : ' + e.message);
  }
}

async function init() {
  await callClaude('Démarre en te présentant en une phrase et pose ta première question immédiatement.');
}

document.getElementById('send').addEventListener('click', () => {
  const val = userInp.value.trim();
  if (!val) return;
  addMsg('user', val);
  userInp.value = '';
  callClaude(val);
});

userInp.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('send').click(); });
</script>
</body>
</html>
